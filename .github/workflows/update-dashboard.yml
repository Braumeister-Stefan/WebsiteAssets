name: Update Dashboard Data

on:
  repository_dispatch:
    types: [update-dashboard]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.DASHBOARD_PAT }}

      - name: Write dashboard data
        env:
          DASHBOARD_JSON: ${{ toJson(github.event.client_payload.data) }}
        run: |
          echo "$DASHBOARD_JSON" > dashboard_data.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard_data.json
          git diff --cached --quiet || git commit -m "chore: update dashboard data [skip netlify]"
          git push
